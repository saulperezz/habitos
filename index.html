<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habitos" />
  <meta name="theme-color" content="#0f0f13" />
  <title>Habitos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #242433;
      --accent: #7c6af7;
      --accent2: #5eead4;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --done: #22c55e;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      padding: 0 0 100px;
    }

    /* ── HEADER ── */
    header {
      padding: 24px 20px 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
      border-bottom: 1px solid var(--surface2);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

    .date-btn {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: capitalize;
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .date-btn:hover { background: var(--accent); color: #fff; }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── HABIT LIST ── */
    main { padding: 16px 16px 0; }

    .habit-list { display: flex; flex-direction: column; gap: 10px; }

    .habit-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1.5px solid transparent;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }

    .habit-card.done {
      border-color: var(--done);
      background: #0d2218;
    }

    .check-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 18px;
      color: transparent;
    }

    .habit-card.done .check-btn {
      border-color: var(--done);
      background: var(--done);
      color: #fff;
    }

    .habit-info { flex: 1; min-width: 0; }

    .habit-name {
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .habit-card.done .habit-name {
      color: var(--text-muted);
    }

    .habit-card { cursor: pointer; }

    .habit-streak {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .streak-fire { color: #fb923c; }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }
    .delete-btn:active { color: #ef4444; background: #2a1010; }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty p:first-child { font-size: 40px; margin-bottom: 12px; }
    .empty p:last-child { font-size: 14px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,106,247,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      z-index: 20;
    }
    .fab:active { transform: scale(0.93); }

    /* ── ADD MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 30;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal h2 { font-size: 18px; margin-bottom: 16px; }

    .modal input,
    .modal textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--surface2);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .modal textarea {
      resize: none;
      height: 76px;
      margin-top: 10px;
      font-size: 14px;
    }
    .modal input:focus,
    .modal textarea:focus { border-color: var(--accent); }

    .modal input.error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    .input-error-msg {
      font-size: 12px;
      color: #ef4444;
      margin-top: 6px;
      min-height: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
    }

    /* ── DETAIL SHEET ── */
    #detailOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #detailOverlay.open { opacity: 1; pointer-events: all; }

    .detail-sheet {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 480px;
      padding: 0 24px env(safe-area-inset-bottom);
      transform: translateY(40px);
      transition: transform .25s;
    }
    #detailOverlay.open .detail-sheet { transform: translateY(0); }

    .detail-handle {
      width: 40px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 12px auto 20px;
    }

    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .detail-status.done-badge  { background: rgba(34,197,94,.15); color: var(--done); }
    .detail-status.todo-badge  { background: var(--surface2); color: var(--text-muted); }

    .detail-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .detail-streak {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .detail-desc-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .detail-desc {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      padding-bottom: 32px;
    }

    .detail-no-desc {
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      padding-bottom: 32px;
    }

    /* ── CALENDAR ── */
    #calOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #calOverlay.open { opacity: 1; pointer-events: all; }

    .cal-sheet {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 480px;
      padding: 0 0 env(safe-area-inset-bottom);
      transform: translateY(40px);
      transition: transform .25s;
    }
    #calOverlay.open .cal-sheet { transform: translateY(0); }

    .cal-handle {
      width: 40px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }

    .cal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      text-transform: capitalize;
    }

    .cal-nav {
      background: var(--surface2);
      border: none;
      color: var(--text);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    .cal-nav:hover { background: var(--accent); }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 0 12px;
      margin-bottom: 4px;
    }

    .cal-weekday {
      text-align: center;
      font-size: .65rem;
      font-weight: 600;
      color: var(--text-muted);
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      padding: 0 12px 28px;
    }

    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      position: relative;
    }

    .cal-day.future { opacity: .3; }
    .cal-day.today  { box-shadow: 0 0 0 2px var(--accent); color: var(--text); }
    .cal-day.none   { color: var(--text-muted); opacity: .45; }
    .cal-day.partial {
      background: rgba(124,106,247,.18);
      color: var(--accent);
    }
    .cal-day.all-done {
      background: rgba(34,197,94,.15);
      color: var(--done);
    }

    .cal-day-num  { line-height: 1; }
    .cal-day-count {
      font-size: .55rem;
      margin-top: 2px;
      opacity: .85;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>Mis Habitos</h1>
    <button class="date-btn" id="dateLabel" onclick="openCalendar()"></button>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 de 0 completados</div>
</header>

<main>
  <div class="habit-list" id="habitList"></div>
</main>

<button class="fab" onclick="openModal()">+</button>

<!-- ADD HABIT MODAL -->
<div class="overlay" id="overlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h2>Nuevo habito</h2>
    <input id="habitInput" type="text" placeholder="Nombre del habito" maxlength="40" />
    <div class="input-error-msg" id="inputError"></div>
    <textarea id="descInput" placeholder="Descripcion (opcional)" maxlength="120"></textarea>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="addHabit()">Agregar</button>
    </div>
  </div>
</div>

<!-- DETAIL SHEET -->
<div id="detailOverlay">
  <div class="detail-sheet">
    <div class="detail-handle"></div>
    <div id="detailStatus" class="detail-status"></div>
    <div id="detailName"   class="detail-name"></div>
    <div id="detailStreak" class="detail-streak"></div>
    <div class="detail-desc-label">Descripcion</div>
    <div id="detailDesc"></div>
  </div>
</div>

<!-- CALENDAR MODAL -->
<div id="calOverlay">
  <div class="cal-sheet">
    <div class="cal-handle"></div>
    <div class="cal-header">
      <button class="cal-nav" onclick="prevMonth()">&#8249;</button>
      <span class="cal-title" id="calMonthLabel"></span>
      <button class="cal-nav" onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="cal-weekdays">
      <span class="cal-weekday">Lu</span>
      <span class="cal-weekday">Ma</span>
      <span class="cal-weekday">Mi</span>
      <span class="cal-weekday">Ju</span>
      <span class="cal-weekday">Vi</span>
      <span class="cal-weekday">Sa</span>
      <span class="cal-weekday">Do</span>
    </div>
    <div class="cal-grid" id="calContent"></div>
  </div>
</div>

<script>
  const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  const today = () => new Date().toLocaleDateString('sv-SE', { timeZone: 'Europe/Madrid' });

  function dateStr(d) {
    return d.toISOString().slice(0, 10);
  }

  // ── Storage ──
  let _mem = null;

  function load() {
    try { return JSON.parse(localStorage.getItem('habits') || '[]'); }
    catch { return _mem || []; }
  }

  function save(habits) {
    _mem = habits;
    try { localStorage.setItem('habits', JSON.stringify(habits)); } catch {}
  }

  // ── Streak ──
  function calcStreak(history) {
    let streak = 0;
    const d = new Date();
    if (!history[today()]) d.setDate(d.getDate() - 1);
    while (history[dateStr(d)]) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  // ── Render ──
  function render() {
    const habits = load();
    const t = today();
    const list = document.getElementById('habitList');

    const d = new Date();
    document.getElementById('dateLabel').textContent = d.toLocaleDateString('es', {
      weekday: 'short', day: 'numeric', month: 'short'
    });

    const total = habits.length;
    const done  = habits.filter(h => h.history && h.history[t]).length;
    const pct   = total ? Math.round(done / total * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${done} de ${total} completados`;

    if (!total) {
      list.innerHTML = `<div class="empty"><p>🌱</p><p>Agrega tu primer habito con el boton +</p></div>`;
      return;
    }

    list.innerHTML = habits.map((h, i) => {
      const isDone = h.history && h.history[t];
      const streak = calcStreak(h.history || {});
      const streakText = streak > 0
        ? `<span class="streak-fire">🔥</span> ${streak} dia${streak > 1 ? 's' : ''} seguido${streak > 1 ? 's' : ''}`
        : 'Sin racha aun';
      return `
        <div class="habit-card ${isDone ? 'done' : ''}" onclick="openDetail(${i})">
          <button class="check-btn" onclick="event.stopPropagation(); toggle(${i})">✓</button>
          <div class="habit-info">
            <div class="habit-name">${escHtml(h.name)}</div>
            <div class="habit-streak">${streakText}</div>
          </div>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteHabit(${i})">✕</button>
        </div>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ──
  function toggle(i) {
    const habits = load();
    const h = habits[i];
    const t = today();
    if (!h.history) h.history = {};
    if (h.history[t]) { delete h.history[t]; }
    else              { h.history[t] = true; }
    save(habits);
    render();
  }

  function deleteHabit(i) {
    const habits = load();
    habits.splice(i, 1);
    save(habits);
    render();
  }

  function addHabit() {
    const input    = document.getElementById('habitInput');
    const errorMsg = document.getElementById('inputError');
    const name     = input.value.trim();

    if (!name) {
      input.classList.remove('error');
      void input.offsetWidth;
      input.classList.add('error');
      errorMsg.textContent = 'Escribe un nombre para el habito';
      input.focus();
      return;
    }

    input.classList.remove('error');
    errorMsg.textContent = '';

    const desc = document.getElementById('descInput').value.trim();
    const habits = load();
    habits.push({ id: Date.now(), name, description: desc, history: {} });
    save(habits);
    closeModal();
    render();
  }

  // ── Add Modal ──
  function openModal() {
    document.getElementById('habitInput').value = '';
    document.getElementById('descInput').value = '';
    document.getElementById('habitInput').classList.remove('error');
    document.getElementById('inputError').textContent = '';
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('habitInput').focus(), 300);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
  }

  function closeModalOnBg(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  document.getElementById('habitInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('descInput').focus();
  });
  document.getElementById('descInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addHabit(); }
  });

  // ── Detail Sheet ──
  function openDetail(i) {
    const habits = load();
    const h = habits[i];
    const t = today();
    const isDone = h.history && h.history[t];
    const streak = calcStreak(h.history || {});

    const statusEl = document.getElementById('detailStatus');
    statusEl.textContent = isDone ? '✓ Completado hoy' : '○ Pendiente hoy';
    statusEl.className = 'detail-status ' + (isDone ? 'done-badge' : 'todo-badge');

    document.getElementById('detailName').textContent = h.name;
    document.getElementById('detailStreak').textContent = streak > 0
      ? `🔥 ${streak} día${streak > 1 ? 's' : ''} seguido${streak > 1 ? 's' : ''}`
      : 'Sin racha aún';

    const descEl = document.getElementById('detailDesc');
    if (h.description) {
      descEl.className = 'detail-desc';
      descEl.textContent = h.description;
    } else {
      descEl.className = 'detail-no-desc';
      descEl.textContent = 'Sin descripción';
    }

    document.getElementById('detailOverlay').classList.add('open');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('open');
  }

  document.getElementById('detailOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  // ── Calendar ──
  let calYear, calMonth;

  function openCalendar() {
    const now = new Date();
    calYear  = now.getFullYear();
    calMonth = now.getMonth();
    renderCalendar();
    document.getElementById('calOverlay').classList.add('open');
  }

  function closeCalendar() {
    document.getElementById('calOverlay').classList.remove('open');
  }

  function prevMonth() {
    if (calMonth === 0) { calMonth = 11; calYear--; } else { calMonth--; }
    renderCalendar();
  }

  function nextMonth() {
    if (calMonth === 11) { calMonth = 0; calYear++; } else { calMonth++; }
    renderCalendar();
  }

  function renderCalendar() {
    const habits   = load();
    const total    = habits.length;
    const todayStr = today();
    const grid     = document.getElementById('calContent');
    const label    = document.getElementById('calMonthLabel');

    label.textContent = `${MONTHS_ES[calMonth]} ${calYear}`;
    grid.innerHTML = '';

    const firstDay    = new Date(calYear, calMonth, 1);
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const startOffset = (firstDay.getDay() + 6) % 7; // Monday = 0

    for (let i = 0; i < startOffset; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-day';
      grid.appendChild(blank);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const mm  = String(calMonth + 1).padStart(2, '0');
      const dd  = String(day).padStart(2, '0');
      const ds  = `${calYear}-${mm}-${dd}`;
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      const numEl = document.createElement('span');
      numEl.className = 'cal-day-num';
      numEl.textContent = day;
      cell.appendChild(numEl);

      if (ds > todayStr) {
        cell.classList.add('future');
      } else {
        if (ds === todayStr) cell.classList.add('today');

        if (total === 0) {
          cell.classList.add('none');
        } else {
          const done = habits.filter(h => h.history && h.history[ds]).length;
          if (done === 0) {
            cell.classList.add('none');
          } else {
            cell.classList.add(done === total ? 'all-done' : 'partial');
            const cnt = document.createElement('span');
            cnt.className = 'cal-day-count';
            cnt.textContent = `${done}/${total}`;
            cell.appendChild(cnt);
          }
        }
      }

      grid.appendChild(cell);
    }
  }

  document.getElementById('calOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeCalendar();
  });

  render();
</script>
</body>
</html>
